<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>多目标·任务清单（Firebase版）</title>
    <!-- Font Awesome 图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDK (兼容模式，方便直接使用) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        /* 样式完全保留，与之前一致，确保iOS体验 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            user-select: none;
        }
        input, textarea, [contenteditable="true"] {
            user-select: text;
            -webkit-user-select: text;
        }
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            -webkit-font-smoothing: antialiased;
        }
        .app-container {
            max-width: 1300px;
            width: 100%;
            background: rgba(255,255,255,0.5);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
            border-radius: 36px;
            box-shadow: 0 20px 40px -12px rgba(0,0,0,0.25);
            padding: 20px;
        }
        button, .icon-btn, .note-btn, .delete-swipe-btn, .add-subtask button, .today-item button {
            min-height: 44px;
            min-width: 44px;
        }
        .add-goal-btn {
            background: white;
            border: none;
            border-radius: 50px;
            padding: 12px 22px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #1b2b4e;
            box-shadow: 0 6px 15px rgba(0,20,50,0.1);
            margin-bottom: 20px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .goals-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 25px;
        }
        .goal-card-wrapper {
            position: relative;
            width: 100%;
            border-radius: 28px;
            background: transparent;
        }
        .goal-card-content {
            background: white;
            border-radius: 28px;
            padding: 18px 22px;
            box-shadow: 0 6px 16px rgba(0,20,50,0.08);
            transition: transform 0.2s ease;
            position: relative;
            z-index: 2;
            width: 100%;
            touch-action: pan-y;
            will-change: transform;
        }
        .goal-card-content.collapsed {
            padding: 12px 20px;
            cursor: pointer;
        }
        .goal-card-content.collapsed .goal-header {
            margin-bottom: 0;
        }
        .goal-card-content.collapsed .progress-wrapper,
        .goal-card-content.collapsed .subtask-list,
        .goal-card-content.collapsed .add-subtask {
            display: none;
        }
        .swiped .goal-card-content {
            transform: translateX(-80px);
        }
        .delete-swipe-btn {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 80px;
            background: #c00;
            color: white;
            border: none;
            border-radius: 0 28px 28px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            gap: 4px;
            cursor: pointer;
            z-index: 1;
            transition: background 0.2s;
            box-shadow: inset 2px 0 5px rgba(0,0,0,0.1);
        }
        .delete-swipe-btn i {
            font-size: 1.8rem;
            pointer-events: none;
        }
        .delete-swipe-btn span {
            font-size: 0.9rem;
            font-weight: 600;
            pointer-events: none;
        }
        .delete-swipe-btn:active {
            background: #a00;
        }
        .goal-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .goal-header i {
            font-size: 1.6rem;
            color: #2b3a67;
            pointer-events: none;
        }
        .goal-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1b2b4e;
            border: none;
            background: transparent;
            flex: 1;
            min-width: 160px;
            padding: 2px 6px;
            border-radius: 12px;
        }
        .goal-title:focus {
            outline: 2px solid #9ab0d1;
            background: #f2f7ff;
        }
        .expand-icon {
            font-size: 1.4rem;
            color: #5a739c;
            margin-left: auto;
            transition: transform 0.2s;
            pointer-events: none;
        }
        .goal-card-content.collapsed .expand-icon {
            transform: rotate(-90deg);
        }
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .progress-bar-bg {
            flex: 1;
            height: 18px;
            background: #e4e9f2;
            border-radius: 30px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #4f9da6, #3a7b9c);
            border-radius: 30px;
            transition: width 0.3s ease;
        }
        .progress-percent {
            font-weight: 600;
            font-size: 1.2rem;
            color: #1d3557;
            min-width: 55px;
        }
        .subtask-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 12px 0 14px;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 4px;
            -webkit-overflow-scrolling: touch;
        }
        .task-item {
            background: #f8faff;
            border-radius: 20px;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            border: 1px solid #eef3fc;
        }
        .task-item.abandoned {
            opacity: 0.5;
            background: #eef1f5;
            text-decoration: line-through 1px #8f9eb5;
            filter: grayscale(0.3);
        }
        .task-item.completed {
            background: #e1f0e8;
            border-color: #9ec5b0;
        }
        .task-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            width: 100%;
        }
        .task-name {
            font-size: 1rem;
            font-weight: 500;
            color: #1e293b;
            min-width: 100px;
            flex: 1 1 auto;
            cursor: default;
            padding: 4px 0;
        }
        .task-name:active {
            background-color: #e0e7f0;
            border-radius: 8px;
        }
        .task-name-editable {
            cursor: text;
        }
        .due-date-input {
            width: 120px;
            padding: 8px 8px;
            border-radius: 30px;
            border: 1px solid #bdc9db;
            font-size: 0.85rem;
            background: white;
        }
        .due-date-input:disabled {
            background: #eef1f5;
            opacity: 0.6;
        }
        .note-btn {
            background: transparent;
            border: none;
            font-size: 1.1rem;
            color: #3e5a7c;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .note-btn.has-note {
            color: #2b6e3b;
        }
        .note-btn:hover {
            background: #d4deef;
        }
        .note-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .note-edit-input, .name-edit-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 30px;
            border: 2px solid #3a7b9c;
            background: white;
            font-size: 1rem;
            outline: none;
            margin-top: 4px;
        }
        .task-actions {
            display: flex;
            align-items: center;
            gap: 5px;
            flex-wrap: wrap;
            margin-left: auto;
        }
        .task-actions input[type="checkbox"] {
            width: 24px;
            height: 24px;
            accent-color: #3a7b9c;
            margin: 0;
        }
        .today-checkbox {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 0.85rem;
            color: #2d4379;
        }
        .duration-input {
            width: 70px;
            padding: 8px 5px;
            border-radius: 30px;
            border: 1px solid #bdc9db;
            text-align: center;
            font-weight: 500;
            background: white;
            font-size: 1rem;
        }
        .icon-btn {
            background: transparent;
            border: none;
            font-size: 1.2rem;
            padding: 0;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #3e5a7c;
            transition: 0.2s;
        }
        .icon-btn:hover {
            background: #d4deef;
        }
        .icon-btn.timer-btn {
            color: #c95131;
        }
        .icon-btn.abandon-btn {
            color: #a05070;
        }
        .icon-btn:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        .note-display {
            font-size: 0.85rem;
            color: #5f6f90;
            background: #eef3fc;
            border-radius: 16px;
            padding: 6px 12px;
            max-width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            display: inline-block;
            align-self: flex-start;
            min-height: 36px;
        }
        .note-display:active {
            background: #dde5f2;
        }
        .add-subtask {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 12px;
            background: #edf3fc;
            border-radius: 50px;
            padding: 8px 14px;
        }
        .add-subtask input[type="text"] {
            flex: 2;
            min-width: 140px;
            padding: 10px 14px;
            border-radius: 30px;
            border: 1px solid #b3c7e0;
            font-size: 1rem;
            background: white;
        }
        .add-subtask input[type="number"] {
            width: 80px;
            padding: 10px 5px;
            border-radius: 30px;
            border: 1px solid #b3c7e0;
            text-align: center;
            font-size: 1rem;
        }
        .add-subtask button {
            background: #2b3a67;
            border: none;
            color: white;
            font-size: 1.1rem;
            padding: 10px 18px;
            border-radius: 30px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            white-space: nowrap;
            min-height: 48px;
        }
        .today-section {
            background: white;
            border-radius: 28px;
            padding: 20px;
            margin-top: 18px;
        }
        .today-section h3 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #1b2b4e;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid #dbe1ec;
            padding-bottom: 8px;
        }
        .today-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 300px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .today-item {
            background: #fafdff;
            border-radius: 18px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid #cbd6e6;
            flex-wrap: wrap;
        }
        .badge-time {
            background: #e3eaf3;
            border-radius: 30px;
            padding: 6px 12px;
            font-weight: 600;
            color: #15304e;
            font-size: 0.9rem;
        }
        .timer-panel {
            background: #1b2b4e;
            color: white;
            border-radius: 50px;
            padding: 14px 22px;
            margin-top: 25px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 12px 20px #0f1a2e;
        }
        .timer-info {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 1.1rem;
        }
        .timer-display {
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            background: #0e1a2b;
            padding: 6px 20px;
            border-radius: 50px;
        }
        .timer-controls {
            display: flex;
            gap: 10px;
        }
        .timer-controls button {
            background: #2f4770;
            border: none;
            color: white;
            font-size: 1.3rem;
            width: 52px;
            height: 52px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        .no-data {
            color: #aab9d4;
            font-style: italic;
            padding: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="app-container" id="appContainer">
    <button class="add-goal-btn" id="addGoalBtn"><i class="fas fa-plus-circle"></i> 添加新大目标</button>
    <div class="goals-grid" id="goalsContainer"></div>
    <div class="today-section">
        <h3><i class="fas fa-sun"></i> 今日任务</h3>
        <div class="today-list" id="todayList"></div>
    </div>
    <div class="timer-panel" id="timerPanel">
        <div class="timer-info">
            <i class="fas fa-stopwatch" style="font-size: 1.8rem;"></i>
            <span id="currentTimerTaskName">未选择任务</span>
        </div>
        <div class="timer-display" id="timerDisplay">00:00</div>
        <div class="timer-controls">
            <button id="timerPlayPauseBtn" title="开始/暂停"><i class="fas fa-play"></i></button>
            <button id="timerResetBtn" title="重置"><i class="fas fa-undo-alt"></i></button>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- Firebase 初始化 ----------
        const firebaseConfig = {
            apiKey: "AIzaSyCZN7aRHx5XmkyyY03Gtg0vRY_QHrWfJ7Y",
            authDomain: "rwqd-1db81.firebaseapp.com",
            projectId: "rwqd-1db81",
            storageBucket: "rwqd-1db81.firebasestorage.app",
            messagingSenderId: "994666286174",
            appId: "1:994666286174:web:382ec9832a0ad253b6f8cf",
            measurementId: "G-BHTNHEFR90"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const goalsCollection = db.collection("goals");

        // ---------- 全局变量 ----------
        let goals = [];                      // 内存数据，由 Firestore 监听更新
        let timerInterval = null;
        let timerSecondsLeft = 0;
        let timerCurrentSubtaskId = null;
        let timerIsRunning = false;
        let editingNoteSubtaskId = null;
        let editingNameSubtaskId = null;
        let swipedGoalId = null;

        // 防双击缩放
        let lastTapTime = 0;

        // DOM 元素
        const goalsContainer = document.getElementById('goalsContainer');
        const todayListDiv = document.getElementById('todayList');
        const timerDisplay = document.getElementById('timerDisplay');
        const timerTaskNameSpan = document.getElementById('currentTimerTaskName');
        const playPauseBtn = document.getElementById('timerPlayPauseBtn');
        const resetBtn = document.getElementById('timerResetBtn');
        const addGoalBtn = document.getElementById('addGoalBtn');

        // ---------- 工具函数 ----------
        function generateId() {
            return Date.now() + '-' + Math.random().toString(36).substr(2, 9);
        }

        function findSubtaskById(subtaskId) {
            for (let goal of goals) {
                const found = goal.subtasks.find(st => st.id === subtaskId);
                if (found) return { goal, subtask: found };
            }
            return null;
        }

        function isGoalCompleted(goal) {
            return !goal.subtasks.some(st => st.status === 'pending');
        }

        function autoUpdateCollapsed(goal) {
            const completed = isGoalCompleted(goal);
            if (completed && !goal.collapsed) {
                goal.collapsed = true;
            } else if (!completed && goal.collapsed) {
                goal.collapsed = false;
            }
        }

        function getSortedSubtasks(goal) {
            return [...goal.subtasks].sort((a, b) => {
                if (a.status === 'pending' && b.status !== 'pending') return -1;
                if (a.status !== 'pending' && b.status === 'pending') return 1;
                return 0;
            });
        }

        // 更新某个目标的进度显示（仅UI辅助，数据已在goals中）
        function updateGoalProgress(goalId) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;
            const total = goal.subtasks.filter(st => st.status !== 'abandoned').length;
            const completed = goal.subtasks.filter(st => st.status === 'completed').length;
            const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
            const goalCard = document.querySelector(`.goal-card-content[data-goal-id="${goalId}"]`);
            if (goalCard && !goalCard.classList.contains('collapsed')) {
                const fill = goalCard.querySelector('.progress-fill');
                const percentSpan = goalCard.querySelector('.progress-percent');
                if (fill) fill.style.width = percent + '%';
                if (percentSpan) percentSpan.innerText = percent + '%';
            }
        }

        // ---------- Firestore 操作 ----------
        async function updateGoalInFirestore(goal) {
            if (!goal || !goal.id) return;
            try {
                await goalsCollection.doc(goal.id).set(goal);
            } catch (error) {
                console.error("保存到Firestore失败: ", error);
            }
        }

        async function deleteGoalFromFirestore(goalId) {
            try {
                await goalsCollection.doc(goalId).delete();
            } catch (error) {
                console.error("删除失败: ", error);
            }
        }

        // 默认数据
        const defaultGoals = [
            {
                id: 'goal1',
                name: '📚 英语进阶计划',
                collapsed: false,
                subtasks: [
                    { id: 's1', parentGoalId: 'goal1', name: '📖 背单词 (30个)', duration: 20, today: true, status: 'pending', dueDate: '', note: '四级词汇' },
                    { id: 's2', parentGoalId: 'goal1', name: '🎧 练听力 (VOA)', duration: 30, today: false, status: 'pending', dueDate: '', note: '' },
                    { id: 's3', parentGoalId: 'goal1', name: '✍️ 写英语日记', duration: 25, today: true, status: 'pending', dueDate: '', note: '关于旅行的感想' },
                    { id: 's4', parentGoalId: 'goal1', name: '🗣️ 口语模仿', duration: 20, today: false, status: 'pending', dueDate: '', note: '' },
                    { id: 's5', parentGoalId: 'goal1', name: '📝 语法练习', duration: 15, today: true, status: 'pending', dueDate: '', note: '' },
                    { id: 's6', parentGoalId: 'goal1', name: '📖 阅读短文', duration: 25, today: false, status: 'pending', dueDate: '', note: '纽约时报文章' }
                ]
            }
        ];

        // 写入默认数据到 Firestore（用于首次启动）
        async function seedDefaultGoals() {
            for (const goal of defaultGoals) {
                await goalsCollection.doc(goal.id).set(goal);
            }
        }

        // ---------- 渲染函数（基于内存 goals） ----------
        function renderAllGoals() {
            let htmlStr = '';
            goals.forEach(goal => {
                const total = goal.subtasks.filter(st => st.status !== 'abandoned').length;
                const completedCount = goal.subtasks.filter(st => st.status === 'completed').length;
                const percent = total === 0 ? 0 : Math.round((completedCount / total) * 100);
                const collapsedClass = goal.collapsed ? 'collapsed' : '';

                let subtasksHtml = '';
                if (!goal.collapsed) {
                    const sortedSubtasks = getSortedSubtasks(goal);
                    sortedSubtasks.forEach(st => {
                        subtasksHtml += renderSubtaskItem(st, goal.id);
                    });
                }

                const progressHtml = !goal.collapsed ? `
                    <div class="progress-wrapper">
                        <div class="progress-bar-bg"><div class="progress-fill" style="width: ${percent}%;"></div></div>
                        <span class="progress-percent">${percent}%</span>
                    </div>
                ` : '';

                const addSubtaskHtml = !goal.collapsed ? `
                    <div class="add-subtask" data-goal-id="${goal.id}">
                        <input type="text" placeholder="子任务名称" class="new-task-name" value="">
                        <input type="number" min="1" value="25" class="new-task-duration">
                        <button class="add-subtask-btn"><i class="fas fa-plus"></i> 添加</button>
                    </div>
                ` : '';

                const isSwipedClass = (swipedGoalId === goal.id) ? 'swiped' : '';

                htmlStr += `
                    <div class="goal-card-wrapper ${isSwipedClass}" data-goal-wrapper-id="${goal.id}">
                        <div class="goal-card-content ${collapsedClass}" data-goal-id="${goal.id}">
                            <div class="goal-header">
                                <i class="fas fa-bullseye"></i>
                                <span class="goal-title" contenteditable="true" data-goal-id="${goal.id}">${goal.name}</span>
                                <i class="fas fa-chevron-down expand-icon"></i>
                            </div>
                            ${progressHtml}
                            <div class="subtask-list" data-goal-id="${goal.id}">${subtasksHtml}</div>
                            ${addSubtaskHtml}
                        </div>
                        <div class="delete-swipe-btn" onclick="deleteGoal('${goal.id}')">
                            <i class="fas fa-trash-alt"></i>
                            <span>删除</span>
                        </div>
                    </div>
                `;
            });
            goalsContainer.innerHTML = htmlStr;
        }

        function renderSubtaskItem(st, goalId) {
            const isAbandoned = st.status === 'abandoned';
            const isCompleted = st.status === 'completed';
            const isEditingNote = (editingNoteSubtaskId === st.id);
            const isEditingName = (editingNameSubtaskId === st.id);

            const completedDisabled = isAbandoned ? 'disabled' : '';
            const completedChecked = st.status === 'completed' ? 'checked' : '';
            const todayDisabled = isAbandoned ? 'disabled' : '';
            const timerDisabled = isAbandoned ? 'disabled' : '';
            const noteDisabled = isAbandoned ? 'disabled' : '';
            const noteClass = st.note && !isEditingNote ? 'has-note' : '';

            let nameControl = '';
            if (isEditingName) {
                nameControl = `<input type="text" class="name-edit-input" data-subtask-id="${st.id}" value="${st.name}" placeholder="任务名称" style="flex:1;">`;
            } else {
                nameControl = `<span class="task-name" ondblclick="editSubtaskName('${st.id}')">${st.name}</span>`;
            }

            let noteDisplay = '';
            if (isEditingNote) {
                noteDisplay = `<input type="text" class="note-edit-input" data-subtask-id="${st.id}" value="${st.note || ''}" placeholder="输入备注">`;
            } else if (st.note) {
                noteDisplay = `<span class="note-display" onclick="editNote('${st.id}')">${st.note}</span>`;
            }

            return `
                <div class="task-item ${isAbandoned ? 'abandoned' : ''} ${isCompleted ? 'completed' : ''}" data-subtask-id="${st.id}">
                    <div class="task-row">
                        ${nameControl}
                        <input type="date" class="due-date-input" value="${st.dueDate || ''}" placeholder="截止日期" ${isAbandoned ? 'disabled' : ''}>
                        <button class="note-btn ${noteClass}" onclick="editNote('${st.id}')" ${noteDisabled} title="备注"><i class="fas fa-${st.note ? 'sticky-note' : 'note-sticky'}"></i></button>
                        <div class="task-actions">
                            <input type="checkbox" class="complete-chk" ${completedChecked} ${completedDisabled}>
                            <label class="today-checkbox">
                                <input type="checkbox" class="today-chk" ${st.today ? 'checked' : ''} ${todayDisabled}>
                                <i class="fas fa-calendar-day"></i>
                            </label>
                            <input type="number" min="1" max="180" value="${st.duration}" class="duration-input" ${isAbandoned ? 'disabled' : ''}>
                            <button class="icon-btn timer-btn" onclick="startTimerFromSubtask('${st.id}')" ${timerDisabled}><i class="fas fa-hourglass-half"></i></button>
                            <button class="icon-btn abandon-btn" onclick="abandonSubtask('${st.id}')" ${(isAbandoned || isCompleted) ? 'disabled' : ''}><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                    ${noteDisplay ? `<div class="task-row">${noteDisplay}</div>` : ''}
                </div>
            `;
        }

        function renderTodayTasks() {
            const todaySubtasks = [];
            goals.forEach(goal => {
                goal.subtasks.forEach(st => {
                    if (st.today && st.status !== 'abandoned') {
                        todaySubtasks.push(st);
                    }
                });
            });
            if (todaySubtasks.length === 0) {
                todayListDiv.innerHTML = '<div class="no-data">今日没有任务，在左侧勾选⭐</div>';
                return;
            }
            let html = '';
            todaySubtasks.forEach(st => {
                const isCompleted = st.status === 'completed';
                html += `
                    <div class="today-item" data-subtask-id="${st.id}">
                        <span class="task-name">${st.name}</span>
                        <span class="badge-time">${st.duration} min</span>
                        <input type="checkbox" class="complete-chk" ${isCompleted ? 'checked' : ''}>
                        <button class="icon-btn timer-btn" onclick="startTimerFromSubtask('${st.id}')" title="计时"><i class="fas fa-stopwatch"></i></button>
                    </div>
                `;
            });
            todayListDiv.innerHTML = html;
        }

        function refreshAll() {
            renderAllGoals();
            renderTodayTasks();
            if (timerCurrentSubtaskId) {
                const found = findSubtaskById(timerCurrentSubtaskId);
                if (!found || found.subtask.status === 'abandoned') {
                    stopTimer();
                    timerCurrentSubtaskId = null;
                    timerTaskNameSpan.innerText = '未选择任务';
                    timerDisplay.innerText = '00:00';
                }
            }
        }

        // 停止计时器
        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            timerIsRunning = false;
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        }
        function updateTimerDisplay() {
            if (timerSecondsLeft < 0) timerSecondsLeft = 0;
            const mins = Math.floor(timerSecondsLeft / 60);
            const secs = timerSecondsLeft % 60;
            timerDisplay.innerText = `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            if (timerSecondsLeft <= 0 && timerInterval) {
                stopTimer();
                timerTaskNameSpan.innerText = (timerTaskNameSpan.innerText.includes('时间到') ? '' : '') + ' 时间到';
            }
        }
        function startTimerCountdown() {
            if (timerInterval) clearInterval(timerInterval);
            timerIsRunning = true;
            playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
            timerInterval = setInterval(() => {
                if (timerSecondsLeft > 0) {
                    timerSecondsLeft -= 1;
                    updateTimerDisplay();
                } else {
                    stopTimer();
                    updateTimerDisplay();
                }
            }, 1000);
        }

        // ---------- 全局函数（供onclick调用）必须绑定到window ----------
        window.deleteGoal = function(goalId) {
            const goal = goals.find(g => g.id === goalId);
            if (!goal) return;
            if (timerCurrentSubtaskId) {
                const found = findSubtaskById(timerCurrentSubtaskId);
                if (found && found.goal.id === goalId) {
                    stopTimer();
                    timerCurrentSubtaskId = null;
                    timerTaskNameSpan.innerText = '未选择任务';
                    timerDisplay.innerText = '00:00';
                }
            }
            // 从 Firestore 删除，监听会更新内存和UI
            deleteGoalFromFirestore(goalId);
            closeAllSwiped();
        };

        window.editNote = function(subtaskId) {
            const found = findSubtaskById(subtaskId);
            if (!found || found.subtask.status === 'abandoned') return;
            if (editingNameSubtaskId) editingNameSubtaskId = null;
            editingNoteSubtaskId = subtaskId;
            refreshAll(); // 重新渲染进入编辑状态
            setTimeout(() => {
                const input = document.querySelector(`.note-edit-input[data-subtask-id="${subtaskId}"]`);
                if (input) input.focus();
            }, 50);
        };

        window.editSubtaskName = function(subtaskId) {
            const found = findSubtaskById(subtaskId);
            if (!found || found.subtask.status === 'abandoned') return;
            if (editingNoteSubtaskId) editingNoteSubtaskId = null;
            editingNameSubtaskId = subtaskId;
            refreshAll();
            setTimeout(() => {
                const input = document.querySelector(`.name-edit-input[data-subtask-id="${subtaskId}"]`);
                if (input) input.focus();
            }, 50);
        };

        window.abandonSubtask = function(subtaskId) {
            const found = findSubtaskById(subtaskId);
            if (!found || found.subtask.status === 'completed' || found.subtask.status === 'abandoned') return;
            // 修改内存中的状态
            found.subtask.status = 'abandoned';
            autoUpdateCollapsed(found.goal);
            if (timerCurrentSubtaskId === subtaskId) {
                stopTimer();
                timerCurrentSubtaskId = null;
                timerTaskNameSpan.innerText = '未选择任务';
                timerDisplay.innerText = '00:00';
            }
            if (editingNoteSubtaskId === subtaskId) editingNoteSubtaskId = null;
            if (editingNameSubtaskId === subtaskId) editingNameSubtaskId = null;
            // 写入 Firestore
            updateGoalInFirestore(found.goal);
            // UI 由监听更新，但为了即时反馈可以刷新（监听也会刷新）
            refreshAll();
        };

        window.startTimerFromSubtask = function(subtaskId) {
            const found = findSubtaskById(subtaskId);
            if (!found || found.subtask.status === 'abandoned') return;
            stopTimer();
            timerCurrentSubtaskId = subtaskId;
            timerSecondsLeft = found.subtask.duration * 60;
            timerIsRunning = false;
            updateTimerDisplay();
            timerTaskNameSpan.innerText = found.subtask.name;
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
        };

        // 关闭所有左滑删除
        function closeAllSwiped() {
            if (swipedGoalId) {
                const prevWrapper = document.querySelector(`.goal-card-wrapper[data-goal-wrapper-id="${swipedGoalId}"]`);
                if (prevWrapper) prevWrapper.classList.remove('swiped');
                swipedGoalId = null;
            }
        }

        // ---------- 滑动删除手势 (保持不变) ----------
        let touchStartX = 0, touchStartY = 0;
        let touchCurrentGoalId = null;
        let touchMoved = false;
        const SWIPE_DISTANCE_THRESHOLD = 40;

        function handleTouchStart(e) {
            if (e.touches.length !== 1) return;
            const touch = e.touches[0];
            const target = touch.target;
            if (target.closest('button, input, .icon-btn, .note-btn, .add-subtask-btn, .due-date-input, .duration-input, .today-checkbox, .note-edit-input, .name-edit-input, .note-display')) {
                return;
            }
            const content = target.closest('.goal-card-content');
            if (!content) return;
            const goalId = content.dataset.goalId;
            if (!goalId) return;

            touchCurrentGoalId = goalId;
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            touchMoved = false;
        }

        function handleTouchMove(e) {
            if (!touchCurrentGoalId) return;
            if (e.touches.length !== 1) return;
            const touch = e.touches[0];
            const deltaX = touch.clientX - touchStartX;
            const deltaY = touch.clientY - touchStartY;

            if (Math.abs(deltaX) > Math.abs(deltaY) && Math.abs(deltaX) > 10) {
                e.preventDefault();
                touchMoved = true;
                const wrapper = document.querySelector(`.goal-card-wrapper[data-goal-wrapper-id="${touchCurrentGoalId}"]`);
                if (wrapper) {
                    let translateX = Math.max(Math.min(deltaX, 0), -80);
                    const content = wrapper.querySelector('.goal-card-content');
                    content.style.transition = 'none';
                    content.style.transform = `translateX(${translateX}px)`;
                }
            }
        }

        function handleTouchEnd(e) {
            if (!touchCurrentGoalId || !touchMoved) {
                if (touchCurrentGoalId) {
                    const wrapper = document.querySelector(`.goal-card-wrapper[data-goal-wrapper-id="${touchCurrentGoalId}"]`);
                    if (wrapper) {
                        const content = wrapper.querySelector('.goal-card-content');
                        content.style.transition = '';
                        content.style.transform = '';
                    }
                }
                touchCurrentGoalId = null;
                return;
            }
            e.preventDefault();

            const touch = e.changedTouches[0];
            if (touch) {
                const deltaX = touch.clientX - touchStartX;
                const wrapper = document.querySelector(`.goal-card-wrapper[data-goal-wrapper-id="${touchCurrentGoalId}"]`);
                if (wrapper) {
                    const content = wrapper.querySelector('.goal-card-content');
                    content.style.transition = '';
                    content.style.transform = '';

                    if (deltaX < -SWIPE_DISTANCE_THRESHOLD) {
                        closeAllSwiped();
                        wrapper.classList.add('swiped');
                        swipedGoalId = touchCurrentGoalId;
                    } else {
                        wrapper.classList.remove('swiped');
                        if (swipedGoalId === touchCurrentGoalId) swipedGoalId = null;
                    }
                }
            }
            touchCurrentGoalId = null;
            touchMoved = false;
        }

        document.addEventListener('click', function(e) {
            if (!e.target.closest('.delete-swipe-btn')) {
                closeAllSwiped();
            }
        });

        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        document.addEventListener('gesturestart', function(e) {
            e.preventDefault();
        });

        document.getElementById('appContainer').addEventListener('touchstart', handleTouchStart, { passive: false });
        document.getElementById('appContainer').addEventListener('touchmove', handleTouchMove, { passive: false });
        document.getElementById('appContainer').addEventListener('touchend', handleTouchEnd);

        // 双击编辑名称防缩放
        document.getElementById('appContainer').addEventListener('touchstart', (e) => {
            const target = e.target;
            if (target.classList.contains('task-name')) {
                const now = Date.now();
                if (now - lastTapTime < 300) {
                    e.preventDefault();
                    const taskItem = target.closest('[data-subtask-id]');
                    if (taskItem) {
                        const subtaskId = taskItem.dataset.subtaskId;
                        const found = findSubtaskById(subtaskId);
                        if (found && found.subtask.status !== 'abandoned') {
                            editSubtaskName(subtaskId);
                        }
                    }
                    lastTapTime = 0;
                } else {
                    lastTapTime = now;
                }
            }
        });

        // 输入框失焦保存
        document.getElementById('appContainer').addEventListener('blur', (e) => {
            if (e.target.classList.contains('note-edit-input') && e.target.dataset.subtaskId) {
                const subtaskId = e.target.dataset.subtaskId;
                const newNote = e.target.value;
                const found = findSubtaskById(subtaskId);
                if (found && editingNoteSubtaskId === subtaskId) {
                    found.subtask.note = newNote;
                    editingNoteSubtaskId = null;
                    updateGoalInFirestore(found.goal);
                    refreshAll();
                }
            } else if (e.target.classList.contains('name-edit-input') && e.target.dataset.subtaskId) {
                const subtaskId = e.target.dataset.subtaskId;
                const newName = e.target.value.trim();
                const found = findSubtaskById(subtaskId);
                if (found && editingNameSubtaskId === subtaskId && newName) {
                    found.subtask.name = newName;
                    editingNameSubtaskId = null;
                    updateGoalInFirestore(found.goal);
                    refreshAll();
                }
            }
        }, true);

        document.getElementById('appContainer').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (e.target.classList.contains('note-edit-input') || e.target.classList.contains('name-edit-input')) {
                    e.preventDefault();
                    e.target.blur();
                }
            } else if (e.key === 'Escape') {
                if (e.target.classList.contains('note-edit-input')) {
                    editingNoteSubtaskId = null;
                    refreshAll();
                } else if (e.target.classList.contains('name-edit-input')) {
                    editingNameSubtaskId = null;
                    refreshAll();
                }
            }
        });

        // 事件代理：处理所有UI交互并写回Firestore
        document.getElementById('appContainer').addEventListener('click', (e) => {
            if (e.target.closest('#addGoalBtn')) {
                const newGoal = {
                    id: generateId(),
                    name: '新目标',
                    collapsed: false,
                    subtasks: []
                };
                // 直接写入Firestore，监听会更新UI
                updateGoalInFirestore(newGoal);
                return;
            }

            // 折叠/展开
            const content = e.target.closest('.goal-card-content');
            if (content && !e.target.closest('.goal-title') && !e.target.closest('button') && !e.target.closest('input') && !e.target.closest('.icon-btn') && !e.target.closest('.note-edit-input') && !e.target.closest('.name-edit-input') && !e.target.closest('.note-display')) {
                const goalId = content.dataset.goalId;
                const goal = goals.find(g => g.id === goalId);
                if (goal) {
                    goal.collapsed = !goal.collapsed;
                    updateGoalInFirestore(goal);
                    refreshAll();
                }
                return;
            }

            // 添加子任务
            if (e.target.closest('.add-subtask-btn')) {
                const addDiv = e.target.closest('.add-subtask');
                if (!addDiv) return;
                const goalId = addDiv.dataset.goalId;
                const goal = goals.find(g => g.id === goalId);
                if (!goal) return;
                const nameInput = addDiv.querySelector('.new-task-name');
                const durationInput = addDiv.querySelector('.new-task-duration');
                const taskName = nameInput.value.trim();
                if (!taskName) {
                    alert('请输入任务名称');
                    return;
                }
                const duration = parseInt(durationInput.value, 10) || 25;
                const newSubtask = {
                    id: generateId(),
                    parentGoalId: goalId,
                    name: taskName,
                    duration: duration,
                    today: false,
                    status: 'pending',
                    dueDate: '',
                    note: ''
                };
                goal.subtasks.push(newSubtask);
                autoUpdateCollapsed(goal);
                updateGoalInFirestore(goal);
                refreshAll();
                nameInput.value = '';
                durationInput.value = '25';
                return;
            }
        });

        // 处理复选框、日期、时长变更
        document.getElementById('appContainer').addEventListener('change', (e) => {
            const target = e.target;
            const taskItem = target.closest('[data-subtask-id]');
            if (!taskItem) return;
            const subtaskId = taskItem.dataset.subtaskId;
            const found = findSubtaskById(subtaskId);
            if (!found || found.subtask.status === 'abandoned') return;

            if (target.classList.contains('due-date-input')) {
                found.subtask.dueDate = target.value;
                updateGoalInFirestore(found.goal);
            } else if (target.classList.contains('duration-input')) {
                const newVal = parseInt(target.value, 10);
                if (!isNaN(newVal) && newVal > 0) {
                    found.subtask.duration = newVal;
                } else {
                    target.value = found.subtask.duration;
                }
                updateGoalInFirestore(found.goal);
                renderTodayTasks();
            } else if (target.classList.contains('complete-chk')) {
                found.subtask.status = target.checked ? 'completed' : 'pending';
                autoUpdateCollapsed(found.goal);
                updateGoalInFirestore(found.goal);
                // 进度和UI将在监听中更新，但提前刷新更快
                refreshAll();
            } else if (target.classList.contains('today-chk')) {
                found.subtask.today = target.checked;
                updateGoalInFirestore(found.goal);
                renderTodayTasks();
            }
        });

        // 大目标标题编辑
        document.getElementById('appContainer').addEventListener('input', (e) => {
            if (e.target.classList.contains('goal-title')) {
                const goalId = e.target.dataset.goalId;
                const goal = goals.find(g => g.id === goalId);
                if (goal) {
                    goal.name = e.target.innerText;
                    updateGoalInFirestore(goal);
                }
            }
        });

        // 计时器按钮
        playPauseBtn.addEventListener('click', () => {
            if (!timerCurrentSubtaskId) {
                alert('请先从任务点击计时按钮⏱️');
                return;
            }
            const found = findSubtaskById(timerCurrentSubtaskId);
            if (!found || found.subtask.status === 'abandoned') {
                stopTimer();
                timerCurrentSubtaskId = null;
                timerTaskNameSpan.innerText = '任务已无效';
                timerDisplay.innerText = '00:00';
                return;
            }
            if (timerIsRunning) {
                stopTimer();
            } else {
                startTimerCountdown();
            }
        });

        resetBtn.addEventListener('click', () => {
            if (!timerCurrentSubtaskId) return;
            const found = findSubtaskById(timerCurrentSubtaskId);
            if (!found || found.subtask.status === 'abandoned') {
                stopTimer();
                timerCurrentSubtaskId = null;
                timerTaskNameSpan.innerText = '未选择任务';
                timerDisplay.innerText = '00:00';
                return;
            }
            timerSecondsLeft = found.subtask.duration * 60;
            updateTimerDisplay();
        });

        // ---------- Firestore 实时监听 ----------
        goalsCollection.onSnapshot((snapshot) => {
            if (snapshot.empty) {
                // 首次启动，写入默认数据
                seedDefaultGoals().then(() => {
                    console.log('默认数据已写入');
                });
                goals = [];
            } else {
                goals = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                // 确保每个子任务的 parentGoalId 正确（可选）
                goals.forEach(goal => {
                    goal.subtasks.forEach(st => { if (!st.parentGoalId) st.parentGoalId = goal.id; });
                });
            }
            refreshAll();
        }, (error) => {
            console.error('监听失败', error);
        });

    })();
</script>
</body>
</html>
